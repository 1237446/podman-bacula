server {
    listen 9097;
    server_name localhost;
    root /var/www/bacularis/htdocs;
    index index.php;
    charset utf-8;

    # --- CABECERAS DE SEGURIDAD REFORZADAS ---
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy (Ajustada para máxima compatibilidad)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self';" always;

    # --- CONFIGURACIÓN DE RENDIMIENTO Y RUTAS ---
    set $baculum_index "index.php";
    send_timeout 300;
    proxy_send_timeout 300;
    proxy_read_timeout 300;
    fastcgi_read_timeout 300;

    location / {
        index $baculum_index;
        try_files $uri $uri/ $baculum_index?$args;
        rewrite ^/(.+)$ /index.php/$1 last;
    }

    # Security.txt (Aparece en tu escaneo como exitoso)
    location = /.well-known/security.txt {
        return 200 "Contact: glenn:admin@gmail.com\nExpires: 2027-01-01T00:00:00.000Z\n";
        default_type "text/plain"; 
    }

    location ~ \.(js|css|png|jpg|gif|ico|ttf|woff|woff2|svg|eot)$ {
        try_files $uri = 404;
    }

    # Procesamiento PHP
    location ~ \.php {
        fastcgi_split_path_info ^(.+\.php)(.*)$;
        set $furi /$baculum_index;
        if (-f $document_root$fastcgi_script_name){
            set $furi $fastcgi_script_name;
        }
        fastcgi_param SCRIPT_FILENAME  $document_root$furi;
        fastcgi_param SERVER_NAME      $host;
        fastcgi_param PATH_INFO        $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED  $document_root$furi;
        fastcgi_pass unix:/var/run/php-fpm.sock;
        include fastcgi_params;
    }
}
