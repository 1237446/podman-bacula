Schedule {
  Name = "WeeklyCycle"
  Run = Level="Full" 1st sun at 23:05
  Run = Level="Differential" 2nd,3rd,4th,5th sun at 23:05
  Run = Level="Incremental" mon,tue,wed,thu,fri,sat at 23:05
}
Schedule {
  Name = "WeeklyCycleAfterBackup"
  Run = Level="Full" at 23:10
}
Fileset {
  Name = "Catalog"
  Include {
    File = "/var/lib/bacula/bacula.sql"
    Options {
      Signature = "Md5"
    }
  }
}
Fileset {
  Name = "Full Set"
  Include {
    File = "/usr/sbin"
    Options {
      Signature = "Md5"
    }
  }
  Exclude {
    File = "/var/lib/bacula"
    File = "/var/lib/bacula/archive"
    File = "/proc"
    File = "/tmp"
    File = "/sys"
    File = "/.journal"
    File = "/.fsck"
  }
}
Fileset {
  Name = "Linux"
  Description = "Archivos a respaldar en Linux"
  EnableVss = no
  Include {
    File = "/home"
    File = "/etc"
    Options {
      Compression = "zstd1"
      Signature = "Sha256"
      Sparse = "Yes"
      AclSupport = "Yes"
      NoAtime = "Yes"
      XattrSupport = "Yes"
    }
  }
  Exclude {
    File = "/var/run"
    File = "/var/cache"
    File = "/tmp"
    File = "*.log"
    File = "*/lost+found"
  }
}
Fileset {
  Name = "Windows"
  Description = "Archivos a respaldar en Windows"
  EnableVss = yes
  Include {
    File = "C:/Users"
    File = "C:/inetpub"
    Options {
      Compression = "zstd1"
      Signature = "Sha256"
      Sparse = "Yes"
      AclSupport = "Yes"
      IgnoreCase = "Yes"
      NoAtime = "Yes"
      XattrSupport = "Yes"
    }
  }
  Exclude {
    File = "*.tmp"
    File = "*.bak"
    File = "*/AppData/Local/Temp"
    File = "pagefile.sys"
    File = "hiberfil.sys"
    File = "C:/Users/Public"
  }
}
Pool {
  Name = "Default"
  PoolType = "Backup"
  MaximumVolumes = 100
  MaximumVolumeBytes = 53687091200
  VolumeRetention = 31536000
  AutoPrune = yes
  Recycle = yes
}
Pool {
  Name = "File"
  PoolType = "Backup"
  LabelFormat = "Vol-"
  MaximumVolumes = 100
  MaximumVolumeBytes = 53687091200
  VolumeRetention = 31536000
  AutoPrune = yes
  Recycle = yes
}
Pool {
  Name = "Scratch"
  PoolType = "Backup"
}
Pool {
  Name = "Pool-S3"
  Description = "Regla de bacula-sd"
  PoolType = "Backup"
  LabelFormat = "S3-"
  MaximumVolumes = 10
  MaximumVolumeBytes = 214748364800
  VolumeUseDuration = 223948800000
  Storage = "File1"
  Catalog = "MyCatalog"
}
Messages {
  Name = "Daemon"
  MailCommand = "/usr/sbin/bsmtp -h localhost -f \"(Bacula) <%r>\" -s \"Bacula daemon message\" %r"
  Mail = root@localhost = All, !Skipped
  Append = /var/log/bacula/bacula.log = All, !Skipped
  Console = All, !Skipped
}
Messages {
  Name = "Standard"
  MailCommand = "/usr/sbin/bsmtp -h localhost -f \"(Bacula) <%r>\" -s \"Bacula: %t %e of %c %l\" %r"
  OperatorCommand = "/usr/sbin/bsmtp -h localhost -f \"(Bacula) <%r>\" -s \"Bacula: Intervention needed for %j\" %r"
  Mail = root@localhost = All, !Skipped
  Append = /var/log/bacula/bacula.log = All, !Skipped
  Console = All, !Skipped
  Operator = root@localhost = Mount
  Catalog = All
}
