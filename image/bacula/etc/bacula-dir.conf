Job {
  Name = "BackupCatalog"
  Level = "Full"
  Fileset = "Catalog"
  Schedule = "WeeklyCycleAfterBackup"
  JobDefs = "DefaultJob"
  WriteBootstrap = "/var/lib/bacula/%n.bsr"
  Runscript {
    RunsWhen = "Before"
    RunsOnClient = no
    Command = "/etc/bacula/scripts/make_catalog_backup bacula"
  }
  Runscript {
    RunsWhen = "After"
    RunsOnClient = no
    Command = "/etc/bacula/scripts/delete_catalog_backup"
  }
  Priority = 11
}
Job {
  Name = "BackupClient1"
  JobDefs = "DefaultJob"
}
